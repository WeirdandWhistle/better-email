<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../stylesheet.css">
    <title>Login to Better Mail</title>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">
        <main style="flex-direction: column;" id="main">
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%; gap: 0.25rem;">
                <h2>Login to Better Mail</h2>
                <div>
                    <input class="textbox" placeholder="username" type="username">
                    @
                    <input class="textbox" placeholder="whynotjava.net">
                </div>
                <input class="textbox" placeholder="password" type="password">
                <h3 class="blue-button">Login</h3>
            </div>
            <hr style="width: 95%;">
             <div style="display: flex; flex-direction: column; align-items: center; width: 100%; gap: 0.25rem;">
                <h2>Signup for Better Mail</h2>
                <div>
                    <input class="textbox" placeholder="username" type="username">
                    @
                    <input class="textbox" placeholder="whynotjava.net" disabled style="cursor: not-allowed;">
                </div>
                <input class="textbox" placeholder="password" type="password">
                <h3 class="blue-button">Signup</h3>
            </div>            

        </main>
    </div>
    <script src="../js/blueButtonSciprt.js"></script>
</body>
</html>
